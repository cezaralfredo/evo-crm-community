services:

  # ---------------------------------------------------------------------------
  # AUTH SERVICE
  # ---------------------------------------------------------------------------
  evo-auth:
    build:
      context: ./evo-auth-service-community
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      RAILS_ENV: production

      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/1

    command: >
      bash -c "
      rm -f /rails/tmp/pids/server.pid &&
      bundle exec rails db:prepare &&
      bundle exec rails s -p 3001 -b 0.0.0.0
      "

    ports:
      - "3001:3001"

  # ---------------------------------------------------------------------------
  # CRM SERVICE
  # ---------------------------------------------------------------------------
  evo-crm:
    build:
      context: ./evo-ai-crm-community
      dockerfile: docker/Dockerfile
      args:
        RAILS_ENV: production

    restart: unless-stopped

    environment:
      RAILS_ENV: production

      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/0

      EVO_AUTH_SERVICE_URL: http://evo-auth:3001

      APP_URL: ${APP_URL}

    command: >
      bash -c "
      rm -f /app/tmp/pids/server.pid &&
      bundle exec rails db:prepare &&
      bundle exec rails s -p 3000 -b 0.0.0.0
      "

    ports:
      - "3000:3000"

  # ---------------------------------------------------------------------------
  # CORE SERVICE
  # ---------------------------------------------------------------------------
  evo-core:
    build:
      context: ./evo-ai-core-service-community
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: ${POSTGRES_USERNAME}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DATABASE}

      DB_SSLMODE: disable

      PORT: 5555

      EVOLUTION_BASE_URL: http://evo-crm:3000
      EVO_AUTH_BASE_URL: http://evo-auth:3001

    ports:
      - "5555:5555"

  # ---------------------------------------------------------------------------
  # FRONTEND
  # ---------------------------------------------------------------------------
  evo-frontend:
    build:
      context: ./evo-ai-frontend-community
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${APP_URL}
        VITE_AUTH_API_URL: ${AUTH_URL}
        VITE_EVOAI_API_URL: ${CORE_URL}

    restart: unless-stopped

    environment:
      VITE_API_URL: ${APP_URL}
      VITE_AUTH_API_URL: ${AUTH_URL}
      VITE_EVOAI_API_URL: ${CORE_URL}

    ports:
      - "5173:80"
